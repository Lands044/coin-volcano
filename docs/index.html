<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="shortcut icon" href="./assets/img/favicon.ico">
		<title>Coin Volcano</title>
		<script type="module" crossorigin="" src="./js/index.min.js?v=1773994662917"></script>
		<link rel="modulepreload" crossorigin="" href="./js/common.min.js?v=1773994662917">
		<link rel="stylesheet" crossorigin="" href="./css/index.min.css?v=1773994662917">
	</head>
	<body>
		<div class="wrapper">
			<main class="page">
				<div class="page__container">
					<div class="game">
						<!-- Main area: sidebar left + drum + sidebar right -->
						<div class="game__main">
							<!-- Left sidebar -->
							<div class="game__sidebar game__sidebar--left">
								<div class="game__logo">
									<img alt="Coin Volcano" fetchpriority="high" src="./assets/img/logo.webp">
								</div>
								<a href="#" class="buy-bonus">
									<span class="buy-bonus__label">BUY BONUS</span>
									<span class="buy-bonus__value">30.00</span>
								</a>
							</div>
							<!-- Drum + Jackpots above it -->
							<div class="game__field">
								<!-- Jackpots top row — same width as drum -->
								<div class="jackpots" id="jackpots">
									<div class="jackpot jackpot--grand">
										<span class="jackpot__label">GRAND</span>
										<span class="jackpot__value">500.00</span>
									</div>
									<div class="jackpot jackpot--major">
										<span class="jackpot__label">MAJOR</span>
										<span class="jackpot__value">50.00</span>
									</div>
									<div class="jackpot jackpot--minor">
										<span class="jackpot__label">MINOR</span>
										<span class="jackpot__value">20.00</span>
									</div>
									<div class="jackpot jackpot--mini">
										<span class="jackpot__label">MINI</span>
										<span class="jackpot__value">10.00</span>
									</div>
								</div>
								<div class="drum">
									<!-- Center win-line highlight overlay -->
									<div class="drum__payline"></div>
									<div class="drum__spinner">
										<div class="drum__column">
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-1.webp">
											</div>
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-2.webp">
											</div>
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-3.webp">
											</div>
										</div>
										<div class="drum__column">
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-5.webp">
											</div>
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-6.webp">
											</div>
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-7.webp">
											</div>
										</div>
										<div class="drum__column">
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-1.webp">
											</div>
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-2.webp">
											</div>
											<div class="drum__image">
												<img alt="Icon game" src="./assets/img/icon/icon-3.webp">
											</div>
										</div>
									</div>
								</div>
							</div>
							<!-- Right sidebar -->
							<div class="game__sidebar game__sidebar--right">
								<a href="#" class="side-btn side-btn--sound menu__sound">
									<span class="side-btn__icon side-btn__icon--sound"></span>
								</a>
								<a href="#" class="side-btn side-btn--turbo menu__button-spin">
									<span class="side-btn__icon side-btn__icon--turbo"></span>
									<span class="side-btn__label">
										Hold for
										<br>
										Turbo Spin
									</span>
								</a>
								<a href="#" class="side-btn side-btn--auto menu__button-auto">
									<span class="side-btn__icon side-btn__icon--auto"></span>
								</a>
							</div>
						</div>
						<!-- Bottom info bar -->
						<div class="menu">
							<div class="menu__info-block">
								<span class="menu__info-label">Win</span>
								<span class="menu__info-value"></span>
							</div>
							<div class="menu__info-block menu__info-block--center">
								<span class="menu__info-label">Balance</span>
								<span class="menu__info-value menu__info">
									<span class="number">1000.00</span>
								</span>
							</div>
							<div class="menu__info-block">
								<span class="menu__info-label">Bet</span>
								<span class="menu__info-value menu__bet-value">
									<span class="number">1.00n</span>
								</span>
							</div>
							<!-- Hidden element needed by JS for showCTA -->
							<div class="menu__bottom hidden"></div>
						</div>
					</div>
					<div class="popup">
						<div class="popup__overlay"></div>
						<div class="popup__content">
							<div class="popup__inner">
								<h2 class="popup__title">Congratulations!</h2>
								<p class="popup__text">Ready to continue playing?</p>
								<a class="cta-button" href="#">Download Now</a>
							</div>
						</div>
					</div>
				</div>
			</main>
		</div>
		<div class="rotate-overlay">
			<div class="rotate-overlay__content">
				<svg xmlns="http://www.w3.org/2000/svg" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
					<rect x="4" y="2" width="16" height="20" rx="2"></rect>
					<path d="M12 18h.01"></path>
				</svg>
				<p>Please rotate your device to portrait mode</p>
			</div>
		</div>
	</body>
</html>
